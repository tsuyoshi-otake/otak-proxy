name: Publish VS Code Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Visual Studio Marketplace
    if: github.repository == 'tsuyoshi-otake/otak-proxy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: xvfb-run -a npm run test:unit:parallel

      - name: Smoke tests
        run: xvfb-run -a npm run test:smoke

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: otak-proxy-vsix
          path: '*.vsix'
          if-no-files-found: error

      - name: Publish to Visual Studio Marketplace
        run: npm run deploy -- --packagePath ./*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
